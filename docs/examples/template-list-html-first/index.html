<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div
    id="comments"
    data-kh-start="list"
    data-kh-template="#comment-template"
    data-kh-style-id="html-first-list-style"
    data-kh-options="#komehub-template-options"
    data-kh-dev-preview="list-basic"></div>

  <template id="comment-template">
    <article class="comment" data-kh="name" data-kh-attr="title">
      <img class="avatar" data-kh="avatar" data-kh-empty="hide" alt="">
      <div class="body">
        <div class="meta">
          <img class="badge" data-kh="badge" data-kh-empty="hide" alt="">
          <span class="name" data-kh="name"></span>
        </div>
        <div class="prefix" data-kh="display.prefix" data-kh-empty="hide"></div>
        <div class="membership-header" data-kh="membershipHeader" data-kh-empty="hide"></div>
        <div class="text" data-kh="display.html" data-kh-mode="html"></div>
        <img class="sticker" data-kh="sticker" data-kh-empty="hide" alt="">
      </div>
    </article>
  </template>

  <script id="komehub-template-options" type="application/json">
  {
    "config": {
      "maxComments": true,
      "cssVars": {
        "fontSize": ["--font-size", "px"],
        "accentColor": "--accent-color"
      },
      "toggleCssVars": {
        "showAvatar": ["--avatar-display", "block", "none"]
      },
      "toggleClasses": {
        "compact": "is-compact"
      },
      "customCss": true
    },
    "preview": {
      "preset": "list-basic",
      "title": "HTML-first list sample",
      "applyConfig": {
        "fontSize": 24,
        "accentColor": "#38bdf8",
        "showAvatar": true,
        "compact": false
      }
    }
  }
  </script>
  <script src="script.js"></script>
</body>
</html>
