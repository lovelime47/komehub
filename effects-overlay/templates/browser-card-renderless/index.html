<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!--
    #comments がコメントカードの差し込み先です。
    data-kh-start="list" と data-kh-template により、runtime が下の
    <template id="comment-template"> を 1 コメントずつ複製して値を流し込みます。
  -->
  <main
    id="comments"
    class="browser-card-list kh-anim-slide-up"
    data-kh-start="list"
    data-kh-template="#comment-template"
    data-kh-style-id="browser-card-renderless-config-style"
    data-kh-options="#komehub-template-options"
    data-kh-dev-preview="list-basic"></main>

  <!--
    コメント 1 件分の多層カードです。
    Browser Colorful 級の「内側に装飾レイヤーを複数持つカード」を、
    renderComment() なしで HTML-first に表すための reference sample です。
  -->
  <template id="comment-template">
    <article class="comment browser-card" data-kh="name" data-kh-attr="title">
      <div class="card-backdrop" aria-hidden="true"></div>
      <div class="card-shell">
        <aside class="meta-rail">
          <span class="theme-icon" aria-hidden="true"></span>
          <span class="rail-dot"></span>
        </aside>
        <div class="card-content">
          <header class="card-header">
            <img class="avatar" data-kh="avatar" data-kh-empty="hide" alt="">
            <div class="identity">
              <div class="name-line">
                <img class="badge" data-kh="badge" data-kh-empty="hide" alt="">
                <span class="name" data-kh="name"></span>
                <span class="role-pill" data-kh="display.role" data-kh-empty="hide"></span>
              </div>
              <div class="sub-line">
                <span class="amount" data-kh="amount" data-kh-empty="hide"></span>
              </div>
            </div>
          </header>
          <div class="notice" data-kh="display.notice" data-kh-empty="hide"></div>
          <p class="membership-header" data-kh="membershipHeader" data-kh-empty="hide"></p>
          <div class="comment-text" data-kh="display.html" data-kh-mode="html"></div>
          <img class="sticker" data-kh="sticker" data-kh-empty="hide" alt="">
        </div>
      </div>
    </article>
  </template>

  <script id="komehub-template-options" type="application/json">
  {
    "config": {
      "maxComments": true,
      "cssVars": {
        "width": ["--card-width", "px"],
        "fontSize": ["--card-font-size", "px"],
        "nameSize": ["--name-font-size", "px"],
        "cardGap": ["--card-gap", "px"],
        "cornerRadius": ["--card-radius", "px"],
        "accentColor": "--accent-color"
      },
      "toggleCssVars": {
        "showAvatar": ["--avatar-display", "block", "none"],
        "showMetaRail": ["--rail-display", "flex", "none"]
      },
      "toggleClasses": {
        "compactMode": "compact-card",
        "typingEnabled": "typing-enabled"
      },
      "customCss": true
    },
    "preview": {
      "preset": "list-basic",
      "title": "Browser card renderless",
      "applyConfig": {
        "maxComments": 15,
        "width": 520,
        "position": "left",
        "fontSize": 18,
        "nameSize": 15,
        "cardGap": 12,
        "cornerRadius": 8,
        "accentColor": "#2f8f83",
        "showAvatar": true,
        "showMetaRail": true,
        "compactMode": false,
        "typingEnabled": true,
        "themeMode": "rotate"
      }
    }
  }
  </script>
  <script src="script.js"></script>
</body>
</html>
