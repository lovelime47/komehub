<!-- 芽吹き: メンバーコメント（ふわもこパステル + バッジ） -->
<div style="
  position: relative;
  border-radius: 20px;
  padding: 12px 18px;
  max-width: 280px;
  background: linear-gradient(135deg, #fce4ec, #f3e5f5);
  border: 2px solid #f48fb1;
  box-shadow: 0 4px 15px rgba(244,143,177,0.3);
  font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
">
  <div style="font-size:11px;font-weight:bold;color:#e91e63;margin-bottom:4px;">
    {{userName}}
    <span style="display:inline-block;background:#2e7d32;color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;">{{memberBadge}}</span>
  </div>
  <div style="font-size:14px;color:#4a2040;line-height:1.5;">{{comment}}</div>
  <!-- しっぽ -->
  <div style="position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:12px solid #f48fb1;"></div>
  <div style="position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #fce4ec;z-index:1;"></div>
</div>
