<!-- 芽吹き: メンバーシップギフト（紫系） -->
<div style="
  position: relative;
  border-radius: 16px;
  padding: 14px 20px;
  max-width: 300px;
  background: linear-gradient(160deg, #f3e5f5, #ede7f6);
  border: 2px solid #ab47bc;
  box-shadow: 0 3px 16px rgba(171,71,188,0.3);
  font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
">
  <div style="position:absolute;top:-8px;left:-6px;font-size:18px;">🎁</div>
  <div style="font-size:11px;font-weight:bold;color:#7b1fa2;margin-bottom:2px;">{{userName}}</div>
  <div style="font-size:13px;font-weight:bold;color:#9c27b0;margin-bottom:4px;">{{giftCount}}人にメンバーシップをギフト！</div>
  <div style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:14px;">🎁</div>
</div>
