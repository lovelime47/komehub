<!-- 芽吹き: メンバー加入/更新（緑系） -->
<div style="
  position: relative;
  border-radius: 16px;
  padding: 14px 20px;
  max-width: 300px;
  background: linear-gradient(160deg, #e8f5e9, #f1f8e9);
  border: 2px solid #66bb6a;
  box-shadow: 0 3px 16px rgba(102,187,106,0.3);
  font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
">
  <div style="position:absolute;top:-8px;left:-6px;font-size:18px;">🎉</div>
  <div style="font-size:11px;font-weight:bold;color:#2e7d32;margin-bottom:2px;">{{userName}}</div>
  <div style="font-size:13px;font-weight:bold;color:#388e3c;margin-bottom:4px;">{{membershipHeader}}</div>
  <div style="font-size:14px;color:#33691e;line-height:1.5;">{{comment}}</div>
  <div style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:14px;">🌱</div>
</div>
