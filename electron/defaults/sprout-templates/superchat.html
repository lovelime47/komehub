<!-- 芽吹き: スーパーチャット（花びら装飾 + 額別配色） -->
<div style="
  position: relative;
  border-radius: 16px;
  padding: 14px 20px;
  max-width: 300px;
  background: linear-gradient(160deg, {{tierBg}}, {{tierBg}});
  border: 2px solid {{tierBorder}};
  box-shadow: 0 3px 16px {{tierBorder}}40;
  font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
">
  <div style="position:absolute;top:-8px;left:-6px;font-size:18px;">{{tierIcon}}</div>
  <div style="font-size:11px;font-weight:bold;color:{{tierNameColor}};margin-bottom:2px;">{{userName}}</div>
  <div style="font-size:13px;font-weight:bold;color:{{tierAmountColor}};margin-bottom:4px;">{{amountDisplay}}</div>
  <div style="font-size:14px;color:#4a2040;line-height:1.5;">{{comment}}</div>
  <div style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:14px;">💰</div>
</div>
